name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: it_dashboard
          POSTGRES_PASSWORD: it_dashboard
          POSTGRES_DB: it_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://it_dashboard:it_dashboard@localhost:5432/it_dashboard
      NEXTAUTH_SECRET: ci-test-secret-at-least-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-encryption-key-32-chars-min-ab
      WEBHOOK_SECRET: ci-webhook-secret-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json | \
            node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const t = d.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              ['lines','statements','functions','branches'].forEach(k =>
                console.log(\`| \${k} | \${t[k].pct}% |\`)
              );
            " >> $GITHUB_STEP_SUMMARY || true

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx next lint --max-warnings 0
